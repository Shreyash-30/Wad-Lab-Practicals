<div class="auth-container" style="text-align: left;">
  <h2 style="text-align: center;">Your Profile</h2>
  
  <div style="background: #f9fafb; padding: 24px; border-radius: 8px; margin-bottom: 24px; border: 1px solid #e5e7eb;">
    <p style="margin: 0 0 8px 0; color: #6b7280; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;">Full Name</p>
    <p style="margin: 0 0 24px 0; font-weight: 600; font-size: 1.2rem; color: #111827;">{{ user.name }}</p>
    
    <p style="margin: 0 0 8px 0; color: #6b7280; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;">Email Address</p>
    <p style="margin: 0; font-weight: 600; font-size: 1.2rem; color: #111827;">{{ user.email }}</p>
  </div>

  <button (click)="logout()" style="width: 100%; background-color: #ef4444;">Log Out</button>
</div>
