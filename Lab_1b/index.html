<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">User Registration</h4>
                        <small>Please fill in the details below</small>
                    </div>
                    <div class="card-body p-4">
                        <form id="registrationForm">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Email address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label fw-bold">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" placeholder="Enter 10-digit phone number" required>
                            </div>
                            <div class="mb-4">
                                <label for="course" class="form-label fw-bold">Select Course</label>
                                <select class="form-select" id="course" required>
                                    <option value="" disabled selected>-- Choose a course --</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Information Technology">Information Technology</option>
                                    <option value="Data Science">Data Science</option>
                                    <option value="Cyber Security">Cyber Security</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
                                Register
                                <span class="spinner-border spinner-border-sm d-none ms-2" id="spinner" role="status" aria-hidden="true"></span>
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-white py-3">
                        <a href="list.html" class="text-decoration-none fw-bold text-primary">View Registered Users →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
